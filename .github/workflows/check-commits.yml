name: Check commits

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  check-fixup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Block fixup commits
        run: |
          if git log --format=%s origin/${{ github.base_ref }}..HEAD | grep -E '^(fixup!|squash!)'; then
            echo "❌ Pull request contains fixup! or squash! commits"
            exit 1
          fi
          echo "✅ No fixup commits found"
